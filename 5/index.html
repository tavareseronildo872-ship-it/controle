<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎮 ADEDONHA ONLINE</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
    *{-webkit-tap-highlight-color:transparent}
    input:focus,textarea:focus,button:focus{outline:none}
    .letra-gigante{font-size:5.5rem;font-weight:900;line-height:1}
    .tela{display:none}
    .tela.ativa{display:block}
    #leitor-qr video{border-radius:16px;width:100%!important;height:auto!important}
    #qrcode img{margin:0 auto}
    .btn-opcao{flex:1;padding:10px 4px;border-radius:12px;font-weight:700;font-size:.82rem;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff}
    .btn-opcao.ativo{background:#fff;color:#7e22ce;border-color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.25)}
    .voto-sim{background:#16a34a;color:#fff}
    .voto-nao{background:#dc2626;color:#fff}
    .voto-sim.selecionado{outline:3px solid #fff;outline-offset:2px;background:#15803d}
    .voto-nao.selecionado{outline:3px solid #fff;outline-offset:2px;background:#b91c1c}
    .fundo-inicial{
        min-height:100vh;
        background-image:
            linear-gradient(135deg, rgba(88,28,135,.82), rgba(219,39,119,.76), rgba(251,146,60,.68)),
            url("imagem.png"), url("imagem.jpg"), url("imagem.jpeg");
        background-size:cover;background-position:center;background-attachment:fixed;
    }
    .fundo-padrao{min-height:100vh;background:linear-gradient(135deg,#4c1d95,#db2777,#fb923c)}
    .erro{background:#b91c1c;color:#fff;padding:8px 12px;border-radius:10px;font-size:12px;margin-top:8px}
</style>
</head>
<body class="text-white">

<div id="corpo" class="fundo-inicial">
<div class="container mx-auto px-4 py-5 max-w-md">

    <div id="erroGeral" class="erro hidden"></div>

    <!-- TELA 1 -->
    <div id="t1" class="tela ativa">
        <h1 class="text-4xl font-black text-center mb-1 drop-shadow-[0_3px_8px_rgba(0,0,0,.6)]">🎮 ADEDONHA</h1>
        <p class="text-center mb-8 opacity-95 text-sm">Jogue online com amigos</p>
        <input id="nome" maxlength="14" placeholder="✏️ Seu nome" class="w-full px-4 py-4 rounded-2xl bg-white/20 backdrop-blur border border-white/30 placeholder-white/75 text-lg mb-4">
        <button onclick="criarSala()" class="w-full py-4 rounded-2xl bg-white text-purple-700 font-bold text-lg shadow-xl mb-4 active:scale-95">➕ CRIAR SALA</button>
        <p class="text-xs opacity-80 mb-1">Código de 6 números:</p>
        <div class="flex gap-2 mb-2">
            <input id="codigo" maxlength="6" inputmode="numeric" pattern="[0-9]*" placeholder="000000" class="flex-1 px-4 py-4 rounded-2xl bg-white/20 backdrop-blur border border-white/30 text-center text-2xl font-bold tracking-[0.4em]">
            <button onclick="abrirLeitorQR()" class="px-4 rounded-2xl bg-blue-500 font-bold shadow-xl active:scale-95 text-xl">📷</button>
        </div>
        <div id="leitor-qr" class="hidden rounded-2xl overflow-hidden mb-3 border border-white/30"></div>
        <button onclick="pararLeitorQR()" id="btnFecharQR" class="hidden w-full mb-3 py-2 rounded-xl bg-red-500/80 text-sm">❌ FECHAR CÂMERA</button>
        <button onclick="entrarSala()" class="w-full py-4 rounded-2xl bg-green-400 text-green-900 font-bold text-lg shadow-xl active:scale-95">ENTRAR NA SALA</button>
        <p id="aviso" class="text-center mt-5 text-yellow-200 text-sm min-h-[1.5rem]"></p>
    </div>

    <!-- TELA 2 -->
    <div id="t2" class="tela">
        <div class="text-center mb-4">
            <p class="text-xs opacity-80">CÓDIGO</p>
            <p id="mostraCodigo" class="letra-gigante text-yellow-300 tracking-[0.2em] font-mono"></p>
            <div class="mt-3 inline-block bg-white p-3 rounded-2xl shadow-xl"><div id="qrcode"></div><p class="text-[10px] text-gray-600 mt-1">Aponte a câmera</p></div>
        </div>
        <h3 class="font-bold mb-2">👥 Jogadores: <span id="qtd">0</span></h3>
        <ul id="jogadores" class="space-y-2 mb-5"></ul>
        <div id="painelDono" class="hidden space-y-4">
            <div>
                <p class="text-sm font-bold mb-2">⏱️ Tempo</p>
                <div class="flex gap-2">
                    <button class="btn-opcao ativo" data-v="60"  data-g="tempo" onclick="sel(this)">1 MIN</button>
                    <button class="btn-opcao"      data-v="180" data-g="tempo" onclick="sel(this)">3 MIN</button>
                    <button class="btn-opcao"      data-v="300" data-g="tempo" onclick="sel(this)">5 MIN</button>
                    <button class="btn-opcao"      data-v="600" data-g="tempo" onclick="sel(this)">10 MIN</button>
                </div>
                <input type="hidden" id="tempo" value="60">
            </div>
            <div>
                <p class="text-sm font-bold mb-2">🎲 Rodadas</p>
                <div class="flex gap-2">
                    <button class="btn-opcao"      data-v="1" data-g="rod" onclick="sel(this)">1</button>
                    <button class="btn-opcao"      data-v="2" data-g="rod" onclick="sel(this)">2</button>
                    <button class="btn-opcao ativo" data-v="3" data-g="rod" onclick="sel(this)">3</button>
                    <button class="btn-opcao"      data-v="4" data-g="rod" onclick="sel(this)">4</button>
                    <button class="btn-opcao"      data-v="5" data-g="rod" onclick="sel(this)">5</button>
                </div>
                <input type="hidden" id="rod" value="3">
            </div>
            <label class="block text-sm">📋 Categorias
                <textarea id="cats" rows="6" class="w-full mt-1 px-3 py-2 rounded-xl bg-white/20 border border-white/30 text-sm">Nome
Cor
Fruta
Lugar
Animal
Profissão
Comida
Marca</textarea>
            </label>
            <button onclick="iniciar()" class="w-full py-4 rounded-2xl bg-green-400 text-green-900 font-bold text-lg shadow-xl">▶️ INICIAR</button>
        </div>
        <p id="avisoSala" class="text-center mt-3 text-yellow-200 text-sm">Aguardando dono...</p>
    </div>

    <!-- TELA 3 -->
    <div id="t3" class="tela">
        <div class="flex justify-between items-center mb-2">
            <div><p class="text-xs opacity-80">LETRA</p><p id="letra" class="letra-gigante text-yellow-300"></p></div>
            <div class="text-right"><p class="text-xs opacity-80">TEMPO</p><p id="crono" class="text-5xl font-black"></p></div>
        </div>
        <p class="text-center text-xs mb-3">Rodada <span id="nr">1</span> de <span id="tr">3</span></p>
        <div id="respostas" class="space-y-2 max-h-[54vh] overflow-y-auto"></div>
        <button onclick="stop()" id="btnStop" class="w-full mt-4 py-4 rounded-2xl bg-red-500 font-bold text-lg shadow-xl">✋ STOP / PAREI</button>
    </div>

    <!-- TELA 4 -->
    <div id="t4" class="tela">
        <h2 class="text-2xl font-bold text-center mb-1">⚖️ ANÁLISE</h2>
        <p class="text-center mb-3">Letra: <b id="lC" class="text-yellow-300 text-xl"></b> · <span id="sv">Carregando...</span></p>
        <div id="correcao" class="space-y-4 max-h-[58vh] overflow-y-auto"></div>
        <button onclick="prox()" id="btnProx" class="w-full mt-4 py-3 rounded-2xl bg-white text-purple-700 font-bold shadow-xl hidden">➡️ PRÓXIMA</button>
    </div>

    <!-- TELA 5 -->
    <div id="t5" class="tela text-center">
        <h2 class="text-3xl font-black mb-5">🏆 FIM!</h2>
        <div id="ranking" class="space-y-2"></div>
        <button onclick="reiniciar()" id="btnReiniciar" class="w-full mt-7 py-4 rounded-2xl bg-white text-purple-700 font-bold shadow-xl hidden">🔄 JOGAR NOVAMENTE</button>
        <button onclick="location.reload()" class="w-full mt-3 py-3 rounded-2xl bg-white/20 font-bold">🏠 INÍCIO</button>
    </div>

</div>
</div>

<script>
// ==================================================
// 👇 COLE AQUI SUAS CHAVES DO FIREBASE CORRETAMENTE
// ==================================================
const firebaseConfig = {
  apiKey: "AIzaSyAXDRmj8tQzxszosyxQi5cLDG87t91ZlGs",
  authDomain: "adedonha-30f7b.firebaseapp.com",
  databaseURL: "https://adedonha-30f7b.firebaseio.com",
  projectId: "adedonha-30f7b",
  storageBucket: "adedonha-30f7b.firebasestorage.app",
  messagingSenderId: "513068782357",
  appId: "1:513068782357:web:06c58a649c3cdf6002cf1c",
  measurementId: "G-G9HG4N0RRH"
};

// TRATAMENTO DE ERRO GERAL
window.onerror = (m,u,l,c,e) => {
    console.error("ERRO:",m,u,l);
    document.getElementById("erroGeral").innerText = "⚠️ Erro: "+m;
    document.getElementById("erroGeral").classList.remove("hidden");
};

// INICIA FIREBASE COM VERIFICAÇÃO
try{
    if(!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("SUA_")){
        throw new Error("Chaves do Firebase não configuradas ainda");
    }
    firebase.initializeApp(firebaseConfig);
    var DB = firebase.database();
    console.log("✅ Firebase conectado");
}catch(e){
    document.getElementById("erroGeral").innerText = "❌ FIREBASE NÃO CONFIGURADO: "+e.message;
    document.getElementById("erroGeral").classList.remove("hidden");
}

const ALFA = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let sala="", meuId="", dono=false, cats=[], crono=null, tempo=60, rodadas=3, njog=0, qr=null, votosOff=null;
const corpo = document.getElementById("corpo");
const aviso = m => document.getElementById("aviso").innerText=m;
const mostraErro = m => {
    const el=document.getElementById("erroGeral"); el.innerText=m;
    if(m) el.classList.remove("hidden"); else el.classList.add("hidden");
};

const ir = n => {
    document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
    document.getElementById("t"+n).classList.add("ativa");
    corpo.className = n===1 ? "fundo-inicial" : "fundo-padrao";
    pararLeitorQR();
    if(votosOff){try{votosOff();votosOff=null}catch(e){}}
};

function sel(el){
    const g=el.dataset.g, v=+el.dataset.v;
    document.querySelectorAll(`.btn-opcao[data-g='${g}']`).forEach(b=>b.classList.remove("ativo"));
    el.classList.add("ativo");
    document.getElementById(g).value=v;
    if(g==="rod") rodadas=v;
    if(g==="tempo") tempo=v;
    if(sala && dono) DB.ref("salas/"+sala).update({tempo:+document.getElementById("tempo").value,rodadas:+document.getElementById("rod").value,categorias:document.getElementById("cats").value});
}

const gerarCod = async () => { let c; do c=String(100000+~~(Math.random()*900000)); while((await DB.ref("salas/"+c).get()).exists()); return c };

async function criarSala(){
    mostraErro("");
    const n=document.getElementById("nome").value.trim();
    if(!n) return aviso("Digite seu nome");
    try{
        sala = await gerarCod();
        meuId = DB.ref("salas/"+sala).push().key;
        dono=true;
        await DB.ref("salas/"+sala).set({
            dono:meuId, status:"aguardando", tempo:60, rodadas:3, rodada:1,
            letra:"", letrasUsadas:[], categorias:document.getElementById("cats").value,
            parou:"", respostas:{}, votos:{}
        });
        await DB.ref("salas/"+sala+"/jogadores/"+meuId).set({nome:n,pontos:0});
        abrirSala();
    }catch(e){ aviso("Erro: "+e.message) }
}

function entrarSala(){
    mostraErro("");
    const n=document.getElementById("nome").value.trim(), c=document.getElementById("codigo").value.trim();
    if(!n) return aviso("Digite seu nome");
    if(!/^\d{6}$/.test(c)) return aviso("São 6 números");
    DB.ref("salas/"+c).get().then(s=>{
        if(!s.exists()) return aviso("Sala não existe");
        if(s.val().status!=="aguardando") return aviso("Jogo já começou");
        sala=c; meuId=DB.ref("salas/"+sala).push().key;
        dono = s.val().dono===meuId;
        rodadas = +(s.val().rodadas||3);
        tempo = +(s.val().tempo||60);
        DB.ref("salas/"+sala+"/jogadores/"+meuId).set({nome:n,pontos:0});
        abrirSala();
    }).catch(e=>aviso(e.message));
}

function abrirSala(){
    ir(2);
    document.getElementById("mostraCodigo").innerText=sala;
    document.getElementById("qrcode").innerHTML="";
    new QRCode(document.getElementById("qrcode"),{text:sala,width:180,height:180});
    if(dono){document.getElementById("painelDono").classList.remove("hidden");document.getElementById("avisoSala").classList.add("hidden")}
    ouvirSala();
}

async function abrirLeitorQR(){
    if(location.protocol!=="https:" && !location.hostname.includes("localhost")){
        return aviso("❌ Câmera só funciona em HTTPS");
    }
    const a=document.getElementById("leitor-qr"),b=document.getElementById("btnFecharQR");
    a.classList.remove("hidden");b.classList.remove("hidden");
    try{
        qr=new Html5Qrcode("leitor-qr");
        await qr.start({facingMode:"environment"},{fps:8,qrbox:{width:250,height:250}},d=>{
            const n=d.replace(/\D/g,"").slice(0,6);
            if(/^\d{6}$/.test(n)){document.getElementById("codigo").value=n;pararLeitorQR();entrarSala()}
        },()=>{});
    }catch(e){aviso("Câmera bloqueada");a.classList.add("hidden");b.classList.add("hidden")}
}
async function pararLeitorQR(){ if(qr?.isScanning) try{await qr.stop()}catch(e){}; document.getElementById("leitor-qr").classList.add("hidden");document.getElementById("btnFecharQR").classList.add("hidden") }

function ouvirSala(){
    DB.ref("salas/"+sala+"/jogadores").on("value",snap=>{
        const j=Object.entries(snap.val()||{}).map(([id,v])=>({id,...v}));
        njog=j.length;
        document.getElementById("qtd").innerText=njog;
        const donoAtual = DB.ref("salas/"+sala+"/dono").get().then(d=>d.val());
        document.getElementById("jogadores").innerHTML = j.map(x=>`<li class="px-4 py-3 rounded-xl bg-white/20 backdrop-blur flex justify-between"><span>${x.nome}</span><span>${x.pontos||0} pts</span></li>`).join("");
    });
    DB.ref("salas/"+sala+"/dono").on("value",s=>{dono=s.val()===meuId});
    DB.ref("salas/"+sala+"/status").on("value",s=>{
        if(s.val()==="jogando") carregaRodada();
        if(s.val()==="correcao") carregaCorrecao();
        if(s.val()==="fim") carregaFim();
    });
}

function iniciar(){
    DB.ref("salas/"+sala).update({tempo:+document.getElementById("tempo").value,rodadas:+document.getElementById("rod").value,categorias:document.getElementById("cats").value});
    DB.ref("salas/"+sala).get().then(d=>{
        const u=d.val().letrasUsadas||[]; let l;
        do l=ALFA[~~(Math.random()*26)]; while(u.includes(l));
        DB.ref("salas/"+sala).update({status:"jogando",rodada:1,letra:l,letrasUsadas:[...u,l],parou:"",tempoRestante:d.val().tempo,respostas:{},votos:{}});
    });
}

function carregaRodada(){
    DB.ref("salas/"+sala).once("value").then(d=>{
        const s=d.val();
        cats=s.categorias.split("\n").map(c=>c.trim()).filter(Boolean);
        tempo=s.tempo; rodadas=+s.rodadas;
        ir(3);
        document.getElementById("letra").innerText=s.letra;
        document.getElementById("nr").innerText=s.rodada;
        document.getElementById("tr").innerText=rodadas;
        document.getElementById("crono").innerText=tempo;
        document.getElementById("btnStop").disabled=false;
        document.getElementById("btnStop").innerText="✋ STOP / PAREI";
        document.getElementById("respostas").innerHTML=cats.map((c,i)=>`<div class="bg-white/15 backdrop-blur rounded-xl px-3 py-2"><label class="text-xs opacity-80">${c}</label><input data-i="${i}" oninput="DB.ref('salas/${sala}/respostas/${meuId}/${i}').set(this.value.toUpperCase().trim())" class="w-full bg-transparent text-lg" autocomplete="off"></div>`).join("");
        clearInterval(crono);
        crono=setInterval(()=>{
            tempo--;
            document.getElementById("crono").innerText=tempo;
            if(tempo<=0){clearInterval(crono);stop()}
        },1000);
    });
}

function stop(){
    clearInterval(crono);
    DB.ref("salas/"+sala).once("value").then(d=>{
        if(d.val().status!=="correcao") DB.ref("salas/"+sala).update({parou:meuId,status:"correcao"});
    });
}

function carregaCorrecao(){
    clearInterval(crono); ir(4);
    DB.ref("salas/"+sala).once("value").then(d=>{
        const s=d.val();
        document.getElementById("lC").innerText=s.letra;
        const jogs=Object.entries(s.jogadores||{});
        const resps=s.respostas||{};
        const total = cats.length * jogs.length;
        let html="";
        cats.forEach((c,ic)=>{
            html += `<div class="bg-white/15 backdrop-blur rounded-xl p-3"><p class="font-bold mb-2">📌 ${c}</p>`;
            jogs.forEach(([jid])=> html += `<div id="r-${ic}-${jid}" class="border-t border-white/10 py-2"></div>`);
            html += `</div>`;
        });
        document.getElementById("correcao").innerHTML=html;

        const atualiza = () => {
            let prontos=0;
            cats.forEach((c,ic)=>jogs.forEach(([jid,j])=>{
                const p=(resps[jid]?.[ic]||"").trim()||"—";
                const vv=s.votos?.[ic]?.[jid]||{};
                const sim=Object.values(vv).filter(x=>x).length;
                const nao=Object.values(vv).filter(x=>x===false).length;
                const tt=jogs.length-1, mj=Math.ceil(tt/2);
                const ok=p!=="—"&&p.startsWith(s.letra) && sim>=mj && sim>0;
                const cheio=sim===tt&&tt>0;
                const pts=!p.startsWith(s.letra)?0:cheio?15:ok?10:0;
                if(sim+nao===tt) prontos++;
                document.getElementById(`r-${ic}-${jid}`).innerHTML=`
                    <div class="flex justify-between items-center">
                        <div><div class="text-sm">${jid===meuId?"🫵 ":""}${j.nome}</div>
                        <div class="font-bold ${ok?'text-green-300':'text-red-300'}">${p}</div>
                        <div class="text-[11px]">✅${sim}/❌${nao} ${pts?`<b>${pts}pts</b>`:""}</div></div>
                        ${jid===meuId?"":`<div class="flex gap-1">
                            <button onclick="votar('${ic}','${jid}',1)" class="voto-sim px-3 py-1.5 rounded-lg text-xs ${vv[meuId]===true?'selecionado':''}">✅</button>
                            <button onclick="votar('${ic}','${jid}',0)" class="voto-nao px-3 py-1.5 rounded-lg text-xs ${vv[meuId]===false?'selecionado':''}">❌</button>
                        </div>`}
                    </div>`;
            }));
            document.getElementById("sv").innerText=`Votos: ${prontos}/${total}`;
            if(prontos===total && dono){
                const pf={}; jogs.forEach(([k])=>pf[k]=0);
                cats.forEach((_,ic)=>jogs.forEach(([k])=>{
                    const v2=s.votos?.[ic]?.[k]||{};
                    const s2=Object.values(v2).filter(x=>x).length,t2=jogs.length-1,m2=Math.ceil(t2/2);
                    pf[k] += (resps[k]?.[ic]||"").startsWith(s.letra)?(s2===t2?15:s2>=m2?10:0):0;
                }));
                jogs.forEach(([k,j])=>DB.ref(`salas/${sala}/jogadores/${k}/pontos`).set((j.pontos||0)+pf[k]));
                document.getElementById("btnProx").classList.remove("hidden");
            }
        };
        votosOff = DB.ref("salas/"+sala+"/votos").on("value",atualiza);
        atualiza();
    });
}

function votar(c,a,v){ DB.ref(`salas/${sala}/votos/${c}/${a}/${meuId}`).set(v===1) }

function prox(){
    DB.ref("salas/"+sala+"/votos").off();
    DB.ref("salas/"+sala).get().then(d=>{
        const s=d.val(), nx=s.rodada+1;
        if(nx > +s.rodadas) return DB.ref("salas/"+sala).update({status:"fim"});
        let l; do l=ALFA[~~(Math.random()*26)]; while(s.letrasUsadas.includes(l));
        DB.ref("salas/"+sala).update({status:"jogando",rodada:nx,letra:l,letrasUsadas:[...s.letrasUsadas,l],parou:"",tempoRestante:s.tempo,respostas:{},votos:{}});
    });
}

function carregaFim(){
    ir(5);
    DB.ref("salas/"+sala+"/jogadores").once("value").then(d=>{
        const arr=Object.values(d.val()||{}).sort((a,b)=>b.pontos-a.pontos);
        const m=["🥇","🥈","🥉"];
        document.getElementById("ranking").innerHTML=arr.map((j,i)=>`<div class="px-4 py-3 rounded-xl bg-white/20 backdrop-blur flex justify-between text-lg"><span>${m[i]||`#${i+1}`} ${j.nome}</span><b>${j.pontos||0} pts</b></div>`).join("");
        if(dono) document.getElementById("btnReiniciar").classList.remove("hidden");
    });
}
function reiniciar(){
    DB.ref("salas/"+sala).update({status:"aguardando",rodada:1,letra:"",letrasUsadas:[],respostas:{},votos:{},parou:""});
    DB.ref("salas/"+sala+"/jogadores").once("value").then(d=>d.forEach(j=>DB.ref(`salas/${sala}/jogadores/${j.key}/pontos`).set(0)));
    ir(2);
}
</script>
</body>
</html>
