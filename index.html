<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Saída - QR Code</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 10px;
            background-color: #f4f4f9;
            margin: 0;
        }
        h1 {
            font-size: 22px;
            color: #333;
        }
        #leitor-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
        }
        button {
            margin-top: 10px;
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
        }
        .btn-camera {
            background-color: #007bff;
        }
        .btn-camera:hover {
            background-color: #0056b3;
        }
        .btn-reiniciar {
            background-color: #dc3545;
            margin-top: 15px;
        }
        .btn-reiniciar:hover {
            background-color: #c82333;
        }
        #mensagem {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .verde {
            color: #155724;
            background-color: #d4edda;
            border: 2px solid #c3e6cb;
            display: block !important;
        }
        .vermelho {
            color: #721c24;
            background-color: #f8d7da;
            border: 2px solid #f5c6cb;
            display: block !important;
        }
        .amarelo {
            color: #856404;
            background-color: #fff3cd;
            border: 2px solid #ffeeba;
            display: block !important;
        }
        
        /* Estilos para a lista de alunos */
        #painel-alunos {
            margin-top: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: left;
        }
        #painel-alunos h2 {
            font-size: 18px;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
        }
        #lista-alunos {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Duas colunas para economizar espaço */
            gap: 10px;
        }
        #lista-alunos li {
            font-size: 13px;
            padding: 8px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .limite-atingido {
            color: #721c24;
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Controle de Saídas da Turma</h1>

    <div id="leitor-container">
        <div id="reader"></div>
        <button class="btn-camera" onclick="alternarCamera()">Mudar Câmera (Frente/Trás)</button>
        <button class="btn-reiniciar" onclick="reiniciarContagem()">Reiniciar Todas as Saídas</button>
    </div>

    <div id="mensagem"></div>

    <div id="painel-alunos">
        <h2>Status das Saídas (Limite: 2)</h2>
        <ul id="lista-alunos">
            </ul>
    </div>

    <script>
        const listaAlunos = [
            "DAVI LUIZ", "ELLYSA MARIA", "FRANCISCO ARTHUR", "IGOR GABRIEL",
            "JOAO VITOR", "KAUAN", "KELVEN HALERRANDRO", "KEVILLY", "LUANA",
            "MARIA APARECIDA", "MARIA EDUARDA", "MATHEUS YAN", "MICAEL",
            "MIGUEL", "PEDRO HENRIQUE", "SAMUEL LEVY", "SANNY KETLEYN",
            "WALLYSON", "YAN VICTOR"
        ];

        // Cria o banco de dados
        const bancoDados = {};
        listaAlunos.forEach(aluno => {
            bancoDados[aluno] = { limite: 2, contador: 0 };
        });

        // Função para atualizar a lista na tela
        function atualizarListaTela() {
            const ul = document.getElementById('lista-alunos');
            ul.innerHTML = ''; // Limpa a lista atual

            listaAlunos.forEach(aluno => {
                const li = document.createElement('li');
                const uso = bancoDados[aluno].contador;
                const max = bancoDados[aluno].limite;
                
                li.innerText = `${aluno}: ${uso}/${max}`;
                
                // Se atingiu o limite, muda a cor do item na lista
                if (uso >= max) {
                    li.className = "limite-atingido";
                }
                
                ul.appendChild(li);
            });
        }

        // Função para zerar todas as saídas
        function reiniciarContagem() {
            const confirmacao = confirm("Tem certeza que deseja zerar as saídas de todos os alunos?");
            if (confirmacao) {
                listaAlunos.forEach(aluno => {
                    bancoDados[aluno].contador = 0;
                });
                document.getElementById('mensagem').style.display = "none"; // Oculta a mensagem grande
                atualizarListaTela(); // Atualiza a tabela lá embaixo
                alert("Todas as saídas foram reiniciadas com sucesso!");
            }
        }

        // --- Lógica do Leitor de QR Code ---
        let html5QrCode;
        let cameraTraseira = true;

        function iniciarCamera() {
            const configCamera = cameraTraseira ? { facingMode: "environment" } : { facingMode: "user" };
            const configLeitor = { fps: 10, qrbox: { width: 250, height: 250 } };

            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    iniciarNovaInstancia(configCamera, configLeitor);
                }).catch(err => console.log("Erro ao parar a câmera: ", err));
            } else {
                iniciarNovaInstancia(configCamera, configLeitor);
            }
        }

        function iniciarNovaInstancia(configCamera, configLeitor) {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                configCamera,
                configLeitor,
                aoLerQrCode,
                (errorMessage) => { /* Ignora erros de "QR não encontrado" para não travar o console */ }
            ).catch((err) => {
                alert("Erro ao acessar a câmera. Verifique as permissões do navegador.");
            });
        }

        function alternarCamera() {
            cameraTraseira = !cameraTraseira;
            iniciarCamera();
        }

        let ultimoLido = "";
        let tempoEspera;

        function aoLerQrCode(textoDecodificado) {
            const nomeAluno = textoDecodificado.trim().toUpperCase();

            // Evita ler o mesmo código sem parar
            if (nomeAluno === ultimoLido) return;
            ultimoLido = nomeAluno;
            clearTimeout(tempoEspera);
            tempoEspera = setTimeout(() => { ultimoLido = ""; }, 4000);

            const msgDiv = document.getElementById('mensagem');

            if (bancoDados[nomeAluno]) {
                if (bancoDados[nomeAluno].contador < bancoDados[nomeAluno].limite) {
                    bancoDados[nomeAluno].contador++;
                    msgDiv.innerHTML = `${nomeAluno}<br><br>Saída permitida (${bancoDados[nomeAluno].contador}/2)`;
                    msgDiv.className = "verde";
                } else {
                    msgDiv.innerHTML = `${nomeAluno}<br><br>Saída negada!<br>Limite de 2 saídas atingido.`;
                    msgDiv.className = "vermelho";
                }
                // Atualiza a lista visual lá embaixo
                atualizarListaTela();
            } else {
                msgDiv.innerHTML = `QR Code LIDO: ${nomeAluno}<br><br>Aluno não encontrado.`;
                msgDiv.className = "amarelo";
            }
        }

        // Inicializa as funções quando a página carrega
        window.onload = function() {
            iniciarCamera();
            atualizarListaTela(); // Gera a lista pela primeira vez com tudo zerado
        };

    </script>
</body>
</html>
