<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Saída - QR Code</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 10px;
            background-color: #f4f4f9;
            margin: 0;
        }
        h1 {
            font-size: 22px;
            color: #333;
        }
        #leitor-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
        }
        button {
            margin-top: 10px;
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            background-color: #007bff;
        }
        button:hover {
            background-color: #0056b3;
        }
        #mensagem {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .verde {
            color: #155724;
            background-color: #d4edda;
            border: 2px solid #c3e6cb;
            display: block !important;
        }
        .vermelho {
            color: #721c24;
            background-color: #f8d7da;
            border: 2px solid #f5c6cb;
            display: block !important;
        }
        .amarelo {
            color: #856404;
            background-color: #fff3cd;
            border: 2px solid #ffeeba;
            display: block !important;
        }
        .azul {
            color: #004085;
            background-color: #cce5ff;
            border: 2px solid #b8daff;
            display: block !important;
        }
        
        /* Estilos para a lista de alunos (Status Atual) */
        .painel {
            margin-top: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: left;
        }
        .painel h2 {
            font-size: 18px;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
            color: #333;
        }
        #lista-alunos {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        #lista-alunos li {
            font-size: 14px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #ddd;
            line-height: 1.5;
        }
        .limite-atingido {
            color: #721c24;
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
        }
        .horario-texto {
            font-size: 12px;
            color: #555;
            display: block;
            margin-top: 4px;
        }

        /* Estilos do Histórico */
        #lista-historico {
            list-style-type: none;
            padding: 0;
            margin: 0;
            max-height: 250px; /* Cria uma barra de rolagem se ficar muito grande */
            overflow-y: auto;
        }
        #lista-historico li {
            font-size: 13px;
            padding: 10px;
            border-bottom: 1px solid #eee;
            color: #444;
            line-height: 1.4;
        }
        .btn-apagar-historico {
            background-color: #dc3545;
            margin-top: 15px;
            padding: 10px;
            font-size: 14px;
        }
        .btn-apagar-historico:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <h1>Controle de Saídas da Turma</h1>

    <div id="leitor-container">
        <div id="reader"></div>
        <button onclick="alternarCamera()">Mudar Câmera (Frente/Trás)</button>
    </div>

    <div id="mensagem"></div>

    <div class="painel" id="painel-alunos">
        <h2>Status Atual (Limite: 2)</h2>
        <ul id="lista-alunos">
            </ul>
    </div>

    <div class="painel" id="painel-historico">
        <h2>Histórico de Saídas Salvo</h2>
        <ul id="lista-historico">
            </ul>
        <button class="btn-apagar-historico" onclick="apagarHistorico()">Apagar Histórico</button>
    </div>

    <script>
        const listaAlunos = [
            "DAVI LUIZ", "ELLYSA MARIA", "FRANCISCO ARTHUR", "IGOR GABRIEL",
            "JOAO VITOR", "KAUAN", "KELVEN HALERRANDRO", "KEVILLY", "LUANA",
            "MARIA APARECIDA", "MARIA EDUARDA", "MATHEUS YAN", "MICAEL",
            "MIGUEL", "PEDRO HENRIQUE", "SAMUEL LEVY", "SANNY KETLEYN",
            "WALLYSON", "YAN VICTOR"
        ];

        let bancoDados = {};
        let historicoGeral = []; // Nova variável para guardar o histórico

        // Carrega os dados salvos no navegador (Status e Histórico)
        function inicializarDados() {
            const dadosSalvos = localStorage.getItem('controleDeSaidasAlunos');
            const historicoSalvo = localStorage.getItem('historicoControleSaidas');
            
            // Inicializa Status Atual
            if (dadosSalvos) {
                bancoDados = JSON.parse(dadosSalvos);
                listaAlunos.forEach(aluno => {
                    if (!bancoDados[aluno]) {
                        bancoDados[aluno] = { limite: 2, contador: 0, hora1: "", hora2: "" };
                    }
                });
            } else {
                listaAlunos.forEach(aluno => {
                    bancoDados[aluno] = { limite: 2, contador: 0, hora1: "", hora2: "" };
                });
            }

            // Inicializa Histórico
            if (historicoSalvo) {
                historicoGeral = JSON.parse(historicoSalvo);
            }

            salvarDados();
        }

        // Salva Status e Histórico no navegador
        function salvarDados() {
            localStorage.setItem('controleDeSaidasAlunos', JSON.stringify(bancoDados));
            localStorage.setItem('historicoControleSaidas', JSON.stringify(historicoGeral));
        }

        // Função para pegar a data atual formatada (DD/MM/AAAA)
        function obterDataAtual() {
            return new Date().toLocaleDateString('pt-BR');
        }

        // Função para pegar a hora atual formatada (HH:MM)
        function obterHoraAtual() {
            const agora = new Date();
            const horas = agora.getHours().toString().padStart(2, '0');
            const minutos = agora.getMinutes().toString().padStart(2, '0');
            return `${horas}:${minutos}`;
        }

        // Atualiza a lista visual de Status Atual
        function atualizarListaTela() {
            const ul = document.getElementById('lista-alunos');
            ul.innerHTML = '';

            listaAlunos.forEach(aluno => {
                const li = document.createElement('li');
                const dados = bancoDados[aluno];
                
                let textoStatus = `<strong>${aluno}</strong>: ${dados.contador}/${dados.limite}`;
                let textoHorarios = "";

                if (dados.contador === 1) {
                    textoHorarios = `<span class="horario-texto">⏱ 1ª Saída: ${dados.hora1}</span>`;
                } else if (dados.contador === 2) {
                    textoHorarios = `<span class="horario-texto">⏱ 1ª Saída: ${dados.hora1} | 2ª Saída: ${dados.hora2}</span>`;
                }
                
                li.innerHTML = textoStatus + textoHorarios;
                
                if (dados.contador >= dados.limite) {
                    li.className = "limite-atingido";
                }
                
                ul.appendChild(li);
            });
        }

        // Atualiza a lista visual do Histórico
        function atualizarHistoricoTela() {
            const ulHist = document.getElementById('lista-historico');
            ulHist.innerHTML = '';

            if (historicoGeral.length === 0) {
                ulHist.innerHTML = '<li style="text-align:center; color:#999;">Nenhum registro no histórico.</li>';
                return;
            }

            // O histórico é exibido mostrando o mais recente no topo
            historicoGeral.forEach(registro => {
                const li = document.createElement('li');
                li.innerHTML = registro;
                ulHist.appendChild(li);
            });
        }

        // Zera o Status Atual (ao ler o QR EDUCADOR)
        function reiniciarContagem() {
            listaAlunos.forEach(aluno => {
                bancoDados[aluno].contador = 0;
                bancoDados[aluno].hora1 = "";
                bancoDados[aluno].hora2 = "";
            });
            
            salvarDados();
            
            const msgDiv = document.getElementById('mensagem');
            msgDiv.innerHTML = "SISTEMA REINICIADO!<br><br>As saídas atuais foram zeradas (o histórico foi mantido).";
            msgDiv.className = "azul";
            
            atualizarListaTela();
        }

        // Apaga o Histórico Permanentemente
        function apagarHistorico() {
            const confirmacao = confirm("Tem certeza que deseja apagar todo o histórico gravado? Esta ação não pode ser desfeita.");
            if (confirmacao) {
                historicoGeral = []; // Zera a lista do histórico
                salvarDados(); // Salva vazio no navegador
                atualizarHistoricoTela(); // Atualiza a tela
                alert("Histórico apagado com sucesso.");
            }
        }

        // --- Lógica do Leitor de QR Code ---
        let html5QrCode;
        let cameraTraseira = true;

        function iniciarCamera() {
            const configCamera = cameraTraseira ? { facingMode: "environment" } : { facingMode: "user" };
            const configLeitor = { fps: 10, qrbox: { width: 250, height: 250 } };

            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    iniciarNovaInstancia(configCamera, configLeitor);
                }).catch(err => console.log("Erro ao parar a câmera: ", err));
            } else {
                iniciarNovaInstancia(configCamera, configLeitor);
            }
        }

        function iniciarNovaInstancia(configCamera, configLeitor) {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                configCamera,
                configLeitor,
                aoLerQrCode,
                (errorMessage) => {} 
            ).catch((err) => {
                alert("Erro ao acessar a câmera. Verifique as permissões do navegador.");
            });
        }

        function alternarCamera() {
            cameraTraseira = !cameraTraseira;
            iniciarCamera();
        }

        let ultimoLido = "";
        let tempoEspera;

        function aoLerQrCode(textoDecodificado) {
            const qrLido = textoDecodificado.trim().toUpperCase();

            if (qrLido === ultimoLido) return;
            ultimoLido = qrLido;
            clearTimeout(tempoEspera);
            tempoEspera = setTimeout(() => { ultimoLido = ""; }, 4000);

            // Lê QR Code do Educador
            if (qrLido === "EDUCADOR") {
                reiniciarContagem();
                return;
            }

            const msgDiv = document.getElementById('mensagem');

            // Lê QR Code do Aluno
            if (bancoDados[qrLido]) {
                if (bancoDados[qrLido].contador < bancoDados[qrLido].limite) {
                    bancoDados[qrLido].contador++;
                    const horaAtual = obterHoraAtual();
                    const dataAtual = obterDataAtual();

                    // Registra o horário da saída atual
                    if (bancoDados[qrLido].contador === 1) {
                        bancoDados[qrLido].hora1 = horaAtual;
                    } else if (bancoDados[qrLido].contador === 2) {
                        bancoDados[qrLido].hora2 = horaAtual;
                    }

                    // --- CRIAÇÃO DO REGISTRO NO HISTÓRICO ---
                    const textoHistorico = `📅 ${dataAtual} às ⏰ ${horaAtual}<br><strong>${qrLido}</strong> (Utilizou a ${bancoDados[qrLido].contador}ª saída)`;
                    historicoGeral.unshift(textoHistorico); // Adiciona no início da lista

                    // Salva tudo na memória
                    salvarDados(); 

                    // Feedback visual principal
                    msgDiv.innerHTML = `${qrLido}<br><br>Saída permitida (${bancoDados[qrLido].contador}/2)<br>⏰ Horário: ${horaAtual}`;
                    msgDiv.className = "verde";
                } else {
                    msgDiv.innerHTML = `${qrLido}<br><br>Saída negada!<br>Limite de 2 saídas atingido.`;
                    msgDiv.className = "vermelho";
                }
                
                // Atualiza as duas áreas da tela
                atualizarListaTela();
                atualizarHistoricoTela();
                
            } else {
                msgDiv.innerHTML = `QR Code LIDO: ${qrLido}<br><br>Aluno não encontrado.`;
                msgDiv.className = "amarelo";
            }
        }

        // Ao abrir a página
        window.onload = function() {
            inicializarDados();
            iniciarCamera();
            atualizarListaTela();
            atualizarHistoricoTela();
        };

    </script>
</body>
</html>
