<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar de Saídas</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        input, select, button { padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: white; border: none; font-weight: bold; }
        button:hover { background: #0056b3; }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
        .btn-back { background: #6c757d; }
        
        .tela { display: none; }
        #tela-login { display: block; }
        
        /* Estilos das listas */
        .lista-item { background: #f8f9fa; border: 1px solid #e9ecef; padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .secao { border-top: 2px solid #eee; margin-top: 20px; padding-top: 15px; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login" class="tela" style="display: block;">
        <h2>Acesso ao Sistema</h2>
        <input type="password" id="input-login" placeholder="Digite sua senha">
        <button onclick="fazerLogin()">Acessar</button>
    </div>

    <div id="tela-gerenciamento" class="tela">
        <div id="adm-lista-turmas">
            <h2>Gestão de Turmas</h2>
            <input type="text" id="input-nova-turma" placeholder="Nome da nova turma (Ex: 1_ANO)">
            <button onclick="criarTurma()" class="btn-success">Criar Turma</button>
            <div id="lista-turmas-adm" style="margin-top:20px;"></div>
        </div>

        <div id="adm-detalhe-turma" class="tela">
            <button onclick="voltarAdm()" class="btn-back">← Voltar</button>
            <h2 id="titulo-turma">Turma</h2>
            
            <div class="secao">
                <h3>Senha Mestra (Diretor)</h3>
                <input type="text" id="input-nova-senha-dir" placeholder="Nova senha diretor">
                <button onclick="salvarSenhaDiretor()">Alterar Senha Diretor</button>
            </div>

            <div class="secao">
                <h3>Senhas (Máx 5)</h3>
                <input type="text" id="input-nova-senha" placeholder="Adicionar senha professor">
                <button onclick="adicionarSenha()">Adicionar</button>
                <div id="lista-senhas-adm"></div>
            </div>

            <div class="secao">
                <h3>Alunos</h3>
                <input type="text" id="input-novo-aluno" placeholder="Nome do Aluno">
                <button onclick="adicionarAluno()" class="btn-success">Adicionar Aluno</button>
                <div id="lista-alunos-adm"></div>
            </div>
        </div>
    </div>

    <div id="tela-diretor" class="tela">
        <h2>Monitoramento Geral</h2>
        <select id="select-monitor" onchange="monitorarTurma()"></select>
        <div id="tabela-monitoramento"></div>
        <button onclick="fazerLogout()" class="btn-back">Sair</button>
    </div>

    <div id="tela-professor" class="tela">
        <h2 id="titulo-prof">Turma</h2>
        <div id="reader" style="width: 100%;"></div>
        <div id="status-msg" style="margin: 20px; font-weight: bold;"></div>
        <div id="lista-alunos-prof"></div>
        <button onclick="fazerLogout()" class="btn-back">Sair</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE (Substitua pelos seus dados)
    const firebaseConfig = {
        apiKey: "AIzaSyBWB41DNUr-14oi6N3D_8M6KPFqH3yYesU",
        authDomain: "controle-de-saida-54745.firebaseapp.com",
        databaseURL: "https://controle-de-saida-54745-default-rtdb.firebaseio.com",
        projectId: "controle-de-saida-54745",
        storageBucket: "controle-de-saida-54745.firebasestorage.app",
        messagingSenderId: "933472401696",
        appId: "1:933472401696:web:a84d400cd2905c6201ff45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dbConfig = {};
    let turmaEmEdicao = "";
    let html5QrCode;

    // Inicializa dados
    db.ref('config').on('value', snap => { dbConfig = snap.val() || { turmas: {}, senha_diretor: "diretor123" }; });

    // LOGIN
    function fazerLogin() {
        const pass = document.getElementById('input-login').value;
        if(pass === "311201") { mostrarTela('tela-gerenciamento'); renderListaTurmas(); }
        else if(pass === dbConfig.senha_diretor) { mostrarTela('tela-diretor'); renderMonitor(); }
        else {
            // Verifica senhas de professor
            let encontrada = null;
            Object.keys(dbConfig.turmas || {}).forEach(t => {
                if((dbConfig.turmas[t].senhas || []).includes(pass)) encontrada = t;
            });
            if(encontrada) { mostrarTela('tela-professor'); iniciarProf(encontrada); }
            else alert("Senha incorreta");
        }
    }

    function mostrarTela(id) {
        document.querySelectorAll('.tela').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function fazerLogout() { location.reload(); }

    // --- GERENCIAMENTO (ADM) ---
    function renderListaTurmas() {
        const list = document.getElementById('lista-turmas-adm');
        list.innerHTML = "";
        Object.keys(dbConfig.turmas || {}).forEach(t => {
            list.innerHTML += `<div class="lista-item"><b>${t}</b> <button onclick="entrarTurma('${t}')">Gerenciar</button></div>`;
        });
    }

    function entrarTurma(t) {
        turmaEmEdicao = t;
        document.getElementById('adm-lista-turmas').style.display = 'none';
        document.getElementById('adm-detalhe-turma').style.display = 'block';
        document.getElementById('titulo-turma').innerText = "Gerenciando: " + t;
        renderDetalhes();
    }

    function voltarAdm() {
        document.getElementById('adm-lista-turmas').style.display = 'block';
        document.getElementById('adm-detalhe-turma').style.display = 'none';
    }

    function criarTurma() {
        const nome = document.getElementById('input-nova-turma').value.toUpperCase();
        if(!nome) return;
        db.ref(`config/turmas/${nome}`).set({ senhas: [] });
        renderListaTurmas();
    }

    function adicionarSenha() {
        let senhas = dbConfig.turmas[turmaEmEdicao].senhas || [];
        if(senhas.length >= 5) return alert("Limite 5 senhas");
        senhas.push(document.getElementById('input-nova-senha').value);
        db.ref(`config/turmas/${turmaEmEdicao}/senhas`).set(senhas).then(renderDetalhes);
    }

    function salvarSenhaDiretor() {
        db.ref('config/senha_diretor').set(document.getElementById('input-nova-senha-dir').value);
        alert("Senha atualizada");
    }

    function adicionarAluno() {
        const nome = document.getElementById('input-novo-aluno').value.toUpperCase();
        db.ref(`salas/${turmaEmEdicao}/alunos/${nome}`).set({cont: 0});
        renderDetalhes();
    }

    function renderDetalhes() {
        // Renderiza senhas e alunos (lógica similar à anterior, simplificada)
        // ... (Implementação de exibição de listas)
        alert("Detalhes carregados (Verifique console para depurar se necessário)");
    }

    // --- DIRETOR ---
    function renderMonitor() {
        const sel = document.getElementById('select-monitor');
        Object.keys(dbConfig.turmas || {}).forEach(t => sel.add(new Option(t, t)));
    }

    function monitorarTurma() {
        const t = document.getElementById('select-monitor').value;
        db.ref(`salas/${t}/alunos`).on('value', snap => {
            const data = snap.val() || {};
            let html = "<table><tr><th>Aluno</th><th>Saídas</th></tr>";
            Object.keys(data).forEach(a => html += `<tr><td>${a}</td><td>${data[a].cont}</td></tr>`);
            document.getElementById('tabela-monitoramento').innerHTML = html + "</table>";
        });
    }

    // --- PROFESSOR ---
    function iniciarProf(turma) {
        document.getElementById('titulo-prof').innerText = "Turma: " + turma;
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({facingMode: "environment"}, {fps: 10, qrbox: 250}, (decodedText) => {
            // Lógica de leitura QR
            db.ref(`salas/${turma}/alunos/${decodedText}`).once('value', snap => {
                if(snap.exists()) {
                    let atual = snap.val().cont || 0;
                    db.ref(`salas/${turma}/alunos/${decodedText}/cont`).set(atual + 1);
                    document.getElementById('status-msg').innerText = "Liberado: " + decodedText;
                }
            });
        });
    }
</script>
</body>
</html>
