<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Saída - QR Code</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 10px;
            background-color: #f4f4f9;
            margin: 0;
        }
        h1 {
            font-size: 22px;
            color: #333;
        }
        #leitor-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
        }
        button {
            margin-top: 10px;
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            background-color: #007bff;
        }
        button:hover {
            background-color: #0056b3;
        }
        #mensagem {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .verde {
            color: #155724;
            background-color: #d4edda;
            border: 2px solid #c3e6cb;
            display: block !important;
        }
        .vermelho {
            color: #721c24;
            background-color: #f8d7da;
            border: 2px solid #f5c6cb;
            display: block !important;
        }
        .amarelo {
            color: #856404;
            background-color: #fff3cd;
            border: 2px solid #ffeeba;
            display: block !important;
        }
        .azul {
            color: #004085;
            background-color: #cce5ff;
            border: 2px solid #b8daff;
            display: block !important;
        }
        
        /* Estilos para a lista de alunos */
        #painel-alunos {
            margin-top: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: left;
        }
        #painel-alunos h2 {
            font-size: 18px;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
        }
        #lista-alunos {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        #lista-alunos li {
            font-size: 14px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #ddd;
            line-height: 1.5;
        }
        .limite-atingido {
            color: #721c24;
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
        }
        .horario-texto {
            font-size: 12px;
            color: #555;
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <h1>Controle de Saídas da Turma</h1>

    <div id="leitor-container">
        <div id="reader"></div>
        <button onclick="alternarCamera()">Mudar Câmera (Frente/Trás)</button>
    </div>

    <div id="mensagem"></div>

    <div id="painel-alunos">
        <h2>Status das Saídas (Limite: 2)</h2>
        <ul id="lista-alunos">
            </ul>
    </div>

    <script>
        const listaAlunos = [
            "DAVI LUIZ", "ELLYSA MARIA", "FRANCISCO ARTHUR", "IGOR GABRIEL",
            "JOAO VITOR", "KAUAN", "KELVEN HALERRANDRO", "KEVILLY", "LUANA",
            "MARIA APARECIDA", "MARIA EDUARDA", "MATHEUS YAN", "MICAEL",
            "MIGUEL", "PEDRO HENRIQUE", "SAMUEL LEVY", "SANNY KETLEYN",
            "WALLYSON", "YAN VICTOR"
        ];

        let bancoDados = {};

        // === NOVA FUNÇÃO: Carregar ou criar os dados salvos ===
        function inicializarDados() {
            const dadosSalvos = localStorage.getItem('controleDeSaidasAlunos');
            
            if (dadosSalvos) {
                // Se já existe algo salvo, carrega para a memória
                bancoDados = JSON.parse(dadosSalvos);
                
                // Atualização de segurança: Se você adicionar um aluno novo no código depois, 
                // ele será incluído na lista salva sem apagar os outros.
                listaAlunos.forEach(aluno => {
                    if (!bancoDados[aluno]) {
                        bancoDados[aluno] = { limite: 2, contador: 0, hora1: "", hora2: "" };
                    }
                });
            } else {
                // Se for a primeira vez abrindo a página, cria o banco do zero
                listaAlunos.forEach(aluno => {
                    bancoDados[aluno] = { limite: 2, contador: 0, hora1: "", hora2: "" };
                });
            }
            // Salva para garantir que a estrutura esteja correta no navegador
            salvarDados();
        }

        // === NOVA FUNÇÃO: Salvar os dados na memória do navegador ===
        function salvarDados() {
            localStorage.setItem('controleDeSaidasAlunos', JSON.stringify(bancoDados));
        }

        // Função para pegar a hora atual formatada (HH:MM)
        function obterHoraAtual() {
            const agora = new Date();
            const horas = agora.getHours().toString().padStart(2, '0');
            const minutos = agora.getMinutes().toString().padStart(2, '0');
            return `${horas}:${minutos}`;
        }

        // Função para atualizar a lista na tela
        function atualizarListaTela() {
            const ul = document.getElementById('lista-alunos');
            ul.innerHTML = ''; // Limpa a lista atual

            listaAlunos.forEach(aluno => {
                const li = document.createElement('li');
                const dados = bancoDados[aluno];
                
                let textoStatus = `<strong>${aluno}</strong>: ${dados.contador}/${dados.limite}`;
                let textoHorarios = "";

                if (dados.contador === 1) {
                    textoHorarios = `<span class="horario-texto">⏱ 1ª Saída: ${dados.hora1}</span>`;
                } else if (dados.contador === 2) {
                    textoHorarios = `<span class="horario-texto">⏱ 1ª Saída: ${dados.hora1} | 2ª Saída: ${dados.hora2}</span>`;
                }
                
                li.innerHTML = textoStatus + textoHorarios;
                
                if (dados.contador >= dados.limite) {
                    li.className = "limite-atingido";
                }
                
                ul.appendChild(li);
            });
        }

        // Função para zerar todas as saídas ao ler o QR Code EDUCADOR
        function reiniciarContagem() {
            listaAlunos.forEach(aluno => {
                bancoDados[aluno].contador = 0;
                bancoDados[aluno].hora1 = "";
                bancoDados[aluno].hora2 = "";
            });
            
            salvarDados(); // Salva os dados zerados permanentemente
            
            const msgDiv = document.getElementById('mensagem');
            msgDiv.innerHTML = "SISTEMA REINICIADO!<br><br>Todas as saídas foram zeradas com sucesso.";
            msgDiv.className = "azul";
            
            atualizarListaTela();
        }

        // --- Lógica do Leitor de QR Code ---
        let html5QrCode;
        let cameraTraseira = true;

        function iniciarCamera() {
            const configCamera = cameraTraseira ? { facingMode: "environment" } : { facingMode: "user" };
            const configLeitor = { fps: 10, qrbox: { width: 250, height: 250 } };

            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    iniciarNovaInstancia(configCamera, configLeitor);
                }).catch(err => console.log("Erro ao parar a câmera: ", err));
            } else {
                iniciarNovaInstancia(configCamera, configLeitor);
            }
        }

        function iniciarNovaInstancia(configCamera, configLeitor) {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                configCamera,
                configLeitor,
                aoLerQrCode,
                (errorMessage) => {} // Ignora erros de leitura contínua
            ).catch((err) => {
                alert("Erro ao acessar a câmera. Verifique as permissões do navegador.");
            });
        }

        function alternarCamera() {
            cameraTraseira = !cameraTraseira;
            iniciarCamera();
        }

        let ultimoLido = "";
        let tempoEspera;

        function aoLerQrCode(textoDecodificado) {
            const qrLido = textoDecodificado.trim().toUpperCase();

            if (qrLido === ultimoLido) return;
            ultimoLido = qrLido;
            clearTimeout(tempoEspera);
            tempoEspera = setTimeout(() => { ultimoLido = ""; }, 4000);

            // Se for o QR Code do educador, reinicia o sistema e salva
            if (qrLido === "EDUCADOR") {
                reiniciarContagem();
                return;
            }

            const msgDiv = document.getElementById('mensagem');

            // Lógica normal dos alunos
            if (bancoDados[qrLido]) {
                if (bancoDados[qrLido].contador < bancoDados[qrLido].limite) {
                    bancoDados[qrLido].contador++;
                    const horaAtual = obterHoraAtual();

                    // Registra o horário da saída
                    if (bancoDados[qrLido].contador === 1) {
                        bancoDados[qrLido].hora1 = horaAtual;
                    } else if (bancoDados[qrLido].contador === 2) {
                        bancoDados[qrLido].hora2 = horaAtual;
                    }

                    salvarDados(); // <--- SALVA OS DADOS APÓS CADA SAÍDA

                    msgDiv.innerHTML = `${qrLido}<br><br>Saída permitida (${bancoDados[qrLido].contador}/2)<br>⏰ Horário: ${horaAtual}`;
                    msgDiv.className = "verde";
                } else {
                    msgDiv.innerHTML = `${qrLido}<br><br>Saída negada!<br>Limite de 2 saídas atingido.`;
                    msgDiv.className = "vermelho";
                }
                atualizarListaTela();
            } else {
                msgDiv.innerHTML = `QR Code LIDO: ${qrLido}<br><br>Aluno não encontrado.`;
                msgDiv.className = "amarelo";
            }
        }

        // Inicializa as funções quando a página carrega
        window.onload = function() {
            inicializarDados(); // Carrega os dados salvos antes de tudo
            iniciarCamera();
            atualizarListaTela();
        };

    </script>
</body>
</html>
